spring.application.name=Collectivite

# ??? PostgreSQL Connection ?????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/agricultural_federation
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ??? Connection Pool (HikariCP, inclus automatiquement) ????????????????????
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ??? Initialisation SQL ????????????????????????????????????????????????????
# Mettre "always" si vous voulez recréer le schéma ŕ chaque démarrage (dev),
# "never" si la base existe déjŕ et que vous ne voulez pas la toucher.
spring.sql.init.mode=never
spring.sql.init.platform=postgresql

# ??? Logs SQL (optionnel, utile en développement) ??????????????????????????
# logging.level.org.springframework.jdbc=DEBUG